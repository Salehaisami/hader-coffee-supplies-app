name: CoffeeSuppliesApp
options:
  bundleIdPrefix: com.haderapp
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: ar
  xcodeVersion: "15.4"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: "11.0.0"
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher.git
    from: "8.0.0"
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing.git
    from: "1.15.0"

targets:
  CoffeeSuppliesApp:
    type: application
    platform: iOS
    sources:
      - CoffeeSuppliesApp
    settings:
      base:
        INFOPLIST_FILE: CoffeeSuppliesApp/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.haderapp.coffeesuppliesapp
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: CoffeeSuppliesApp/App/CoffeeSuppliesApp.entitlements
        DEVELOPMENT_TEAM: KHHNUYST98
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
    dependencies:
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseStorage
      - package: Firebase
        product: FirebaseFunctions
      - package: Firebase
        product: FirebaseMessaging
      - package: Kingfisher

  CoffeeSuppliesAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CoffeeSuppliesAppTests
    dependencies:
      - target: CoffeeSuppliesApp
      - package: SnapshotTesting
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/CoffeeSuppliesApp.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/CoffeeSuppliesApp"

  CoffeeSuppliesAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - CoffeeSuppliesAppUITests
    dependencies:
      - target: CoffeeSuppliesApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_TARGET_NAME: CoffeeSuppliesApp
